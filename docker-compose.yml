version: "3.9"

services:
  onchainmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onchainmind-mcp
    ports:
      - "3001:3001"
    environment:
      - ONCHAINMIND_PHAROS_RPC_URL=${ONCHAINMIND_PHAROS_RPC_URL:-https://testnet.pharosnetwork.xyz}
      - ONCHAINMIND_MCP_TRANSPORT=stdio
      - ONCHAINMIND_LOG_LEVEL=info
      - ONCHAINMIND_CACHE_TTL_MS=30000
      - ONCHAINMIND_RETRY_MAX_ATTEMPTS=3
      - ONCHAINMIND_RETRY_BASE_DELAY_MS=1000
    volumes:
      - ./config:/app/config
    restart: unless-stopped

  onchainmind-sse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onchainmind-mcp-sse
    ports:
      - "3002:3002"
    environment:
      - ONCHAINMIND_PHAROS_RPC_URL=${ONCHAINMIND_PHAROS_RPC_URL:-https://testnet.pharosnetwork.xyz}
      - ONCHAINMIND_MCP_TRANSPORT=sse
      - ONCHAINMIND_SSE_PORT=3002
      - ONCHAINMIND_LOG_LEVEL=info
      - ONCHAINMIND_AUTH_TOKEN=${ONCHAINMIND_AUTH_TOKEN:-}
    restart: unless-stopped
